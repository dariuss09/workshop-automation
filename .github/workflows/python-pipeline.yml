name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'python3-hello/**'
      - '.github/workflows/python-pipeline.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python python3-hello/hello.py

  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./python3-hello
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/python3-hello:latest
            ghcr.io/${{ github.repository_owner }}/python3-hello:${{ github.sha }}