name: Code Verification (CI)

# Step 1: When should it run?
on: [push, pull_request]

# Step 2: Which runner do we use and what steps do we execute?
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      # Clones the repository code into the virtual machine
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Installs the GCC compiler on the cloud Linux runner only
      - name: Install GCC
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      # Compiles the program exactly as you would locally
      - name: Compile C program
        run: gcc c-bye/bye.c -o c-bye/bye

      # Runs the resulting binary (Linux/macOS)
      - name: Run application (Unix)
        if: runner.os != 'Windows'
        run: ./c-bye/bye

      # Runs the resulting binary (Windows)
      - name: Run application (Windows)
        if: runner.os == 'Windows'
        run: ./c-bye/bye.exe